<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#F0F4FA" opacity="0.07"/>
    </pattern>
    <radialGradient id="orbCyan" cx="25%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#50A891" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#50A891" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbPurple" cx="75%" cy="60%" r="30%">
      <stop offset="0%" stop-color="#8B62CC" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8B62CC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0F4FA" stop-opacity="0"/>
      <stop offset="20%" stop-color="#F0F4FA" stop-opacity="0.15"/>
      <stop offset="80%" stop-color="#F0F4FA" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F0F4FA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#50A891" stop-opacity="0"/>
      <stop offset="50%" stop-color="#50A891" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B62CC" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="#0F1419"/>
  <rect width="900" height="320" fill="url(#dotGrid)"/>
  <rect width="900" height="320" fill="url(#orbCyan)"/>
  <rect width="900" height="320" fill="url(#orbPurple)"/>

  <!-- Border frame -->
  <rect x="1" y="1" width="898" height="318" fill="none" stroke="#F0F4FA" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Corner brackets -->
  <path d="M 0,30 L 0,0 L 30,0" fill="none" stroke="#50A891" stroke-opacity="0.4" stroke-width="2"/>
  <path d="M 870,0 L 900,0 L 900,30" fill="none" stroke="#50A891" stroke-opacity="0.4" stroke-width="2"/>
  <path d="M 0,290 L 0,320 L 30,320" fill="none" stroke="#8B62CC" stroke-opacity="0.4" stroke-width="2"/>
  <path d="M 870,320 L 900,320 L 900,290" fill="none" stroke="#8B62CC" stroke-opacity="0.4" stroke-width="2"/>

  <!-- Top system text -->
  <text x="450" y="60" text-anchor="middle" fill="#F0F4FA" opacity="0.3" font-family="monospace" font-size="10" letter-spacing="3">// SECURE CONNECTION ESTABLISHED</text>

  <!-- Name -->
  <text x="450" y="130" text-anchor="middle" fill="#F0F4FA" font-family="monospace" font-size="52" font-weight="900" letter-spacing="6">AHMAD HASAN</text>

  <!-- Role -->
  <text x="450" y="175" text-anchor="middle" fill="#F0F4FA" opacity="0.6" font-family="monospace" font-size="16" letter-spacing="2">Co-founder &amp; CTO @ Constant Labs</text>

  <!-- Divider line -->
  <rect x="200" y="200" width="500" height="1" fill="url(#accentLine)"/>

  <!-- Tags -->
  <text x="450" y="235" text-anchor="middle" fill="#50A891" opacity="0.7" font-family="monospace" font-size="12" letter-spacing="4">FULL-STACK  ·  AI  ·  IoT  ·  MOBILE  ·  ROBOTICS</text>

  <!-- Location -->
  <text x="450" y="270" text-anchor="middle" fill="#F0F4FA" opacity="0.35" font-family="monospace" font-size="11" letter-spacing="2">physicist turned builder  //  Dubai, UAE</text>

  <!-- Bottom accent line -->
  <rect x="100" y="300" width="700" height="1" fill="url(#lineGrad)"/>

  <!-- Scattered particles -->
  <circle cx="120" cy="80" r="1" fill="#50A891" opacity="0.4"/>
  <circle cx="780" cy="95" r="1.2" fill="#8B62CC" opacity="0.35"/>
  <circle cx="200" cy="280" r="0.8" fill="#D4A13D" opacity="0.3"/>
  <circle cx="700" cy="55" r="1" fill="#4BA370" opacity="0.35"/>
  <circle cx="350" cy="290" r="0.9" fill="#A03A80" opacity="0.3"/>
  <circle cx="550" cy="45" r="1.1" fill="#50A891" opacity="0.25"/>
  <circle cx="830" cy="250" r="0.7" fill="#D4A13D" opacity="0.4"/>
  <circle cx="70" cy="200" r="1" fill="#8B62CC" opacity="0.3"/>
  <circle cx="450" cy="305" r="0.8" fill="#4BA370" opacity="0.25"/>
  <circle cx="650" cy="280" r="1" fill="#A03A80" opacity="0.2"/>
  <circle cx="300" cy="50" r="0.9" fill="#50A891" opacity="0.3"/>
  <circle cx="600" cy="100" r="1.2" fill="#8B62CC" opacity="0.2"/>

  <!-- Faint connection lines between some particles -->
  <line x1="120" y1="80" x2="200" y2="280" stroke="#50A891" stroke-opacity="0.06" stroke-width="0.5"/>
  <line x1="780" y1="95" x2="700" y2="55" stroke="#8B62CC" stroke-opacity="0.06" stroke-width="0.5"/>
  <line x1="550" y1="45" x2="600" y2="100" stroke="#50A891" stroke-opacity="0.08" stroke-width="0.5"/>
  <line x1="350" y1="290" x2="450" y2="305" stroke="#A03A80" stroke-opacity="0.06" stroke-width="0.5"/>
</svg>
