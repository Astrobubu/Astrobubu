<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="#F0F4FA" opacity="0.05"/>
    </pattern>
    <radialGradient id="orbAmber" cx="25%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#D4A13D" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#D4A13D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbCyan" cx="80%" cy="70%" r="30%">
      <stop offset="0%" stop-color="#50A891" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#50A891" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A13D" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D4A13D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="#0F1419"/>
  <rect width="400" height="200" fill="url(#dotGrid)"/>
  <rect width="400" height="200" fill="url(#orbAmber)"/>
  <rect width="400" height="200" fill="url(#orbCyan)"/>

  <!-- Border -->
  <rect x="0.75" y="0.75" width="398.5" height="198.5" fill="none" stroke="#F0F4FA" stroke-opacity="0.1" stroke-width="1.5"/>

  <!-- Corner brackets -->
  <path d="M 0,20 L 0,0 L 20,0" fill="none" stroke="#D4A13D" stroke-opacity="0.4" stroke-width="1.5"/>
  <path d="M 380,0 L 400,0 L 400,20" fill="none" stroke="#D4A13D" stroke-opacity="0.4" stroke-width="1.5"/>
  <path d="M 0,180 L 0,200 L 20,200" fill="none" stroke="#D4A13D" stroke-opacity="0.4" stroke-width="1.5"/>
  <path d="M 380,200 L 400,200 L 400,180" fill="none" stroke="#D4A13D" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Status badge: DEV -->
  <rect x="320" y="16" width="55" height="20" rx="2" fill="none" stroke="#3b82f6" stroke-opacity="0.6" stroke-width="1"/>
  <text x="347" y="30" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="9" letter-spacing="1">DEV</text>

  <!-- Title -->
  <text x="24" y="42" fill="#F0F4FA" font-family="monospace" font-size="18" font-weight="bold" letter-spacing="3">SMARTROADS</text>

  <!-- Title underline -->
  <rect x="24" y="54" width="176" height="1" fill="url(#titleLine)"/>

  <!-- Description -->
  <text x="24" y="76" fill="#F0F4FA" opacity="0.65" font-family="monospace" font-size="12">Revolutionary traffic management.</text>
  <text x="24" y="94" fill="#F0F4FA" opacity="0.45" font-family="monospace" font-size="11">Coordinate 5% of vehicles to eliminate</text>
  <text x="24" y="112" fill="#F0F4FA" opacity="0.45" font-family="monospace" font-size="11">congestion. RTK GPS + AI coordination.</text>

  <!-- Tags -->
  <text x="24" y="140" fill="#D4A13D" opacity="0.6" font-family="monospace" font-size="10">Traffic AI · RTK GPS · IoT · V2X</text>

  <!-- Link -->
  <text x="24" y="156" fill="#F0F4FA" opacity="0.3" font-family="monospace" font-size="9">constantlabs.ai/smartroads</text>

  <!-- Particles -->
  <circle cx="349" cy="154" r="1" fill="#D4A13D" opacity="0.35"/>
  <circle cx="374" cy="88" r="0.8" fill="#50A891" opacity="0.25"/>
  <circle cx="359" cy="189" r="1.1" fill="#D4A13D" opacity="0.2"/>
</svg>
