<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="#F0F4FA" opacity="0.05"/>
    </pattern>
    <radialGradient id="orbCyan" cx="15%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#50A891" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#50A891" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#50A891" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#50A891" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="#0F1419"/>
  <rect width="400" height="200" fill="url(#dotGrid)"/>
  <rect width="400" height="200" fill="url(#orbCyan)"/>

  <!-- Border -->
  <rect x="0.75" y="0.75" width="398.5" height="198.5" fill="none" stroke="#F0F4FA" stroke-opacity="0.1" stroke-width="1.5"/>

  <!-- Corner brackets -->
  <path d="M 0,20 L 0,0 L 20,0" fill="none" stroke="#50A891" stroke-opacity="0.4" stroke-width="1.5"/>
  <path d="M 380,0 L 400,0 L 400,20" fill="none" stroke="#50A891" stroke-opacity="0.4" stroke-width="1.5"/>
  <path d="M 0,180 L 0,200 L 20,200" fill="none" stroke="#50A891" stroke-opacity="0.4" stroke-width="1.5"/>
  <path d="M 380,200 L 400,200 L 400,180" fill="none" stroke="#50A891" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Status badge: LIVE -->
  <rect x="320" y="16" width="55" height="20" rx="2" fill="none" stroke="#22c55e" stroke-opacity="0.6" stroke-width="1"/>
  <text x="347" y="30" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="9" letter-spacing="1">LIVE</text>

  <!-- Title -->
  <text x="24" y="42" fill="#F0F4FA" font-family="monospace" font-size="18" font-weight="bold" letter-spacing="3">MUFAKKIR</text>

  <!-- Title underline -->
  <rect x="24" y="54" width="176" height="1" fill="url(#titleLine)"/>

  <!-- Description -->
  <text x="24" y="76" fill="#F0F4FA" opacity="0.65" font-family="monospace" font-size="12">Voice-to-text Arabic transcription</text>
  <text x="24" y="94" fill="#F0F4FA" opacity="0.45" font-family="monospace" font-size="11">with AI. Real-time speech recognition</text>
  <text x="24" y="112" fill="#F0F4FA" opacity="0.45" font-family="monospace" font-size="11">across 50+ languages and 10+ Arabic dialects.</text>

  <!-- Tags -->
  <text x="24" y="140" fill="#50A891" opacity="0.6" font-family="monospace" font-size="10">AI · Speech-to-Text · Arabic</text>

  <!-- Link -->
  <text x="24" y="156" fill="#F0F4FA" opacity="0.3" font-family="monospace" font-size="9">mufakkir.app</text>

  <!-- Particles -->
  <circle cx="350" cy="150" r="1" fill="#50A891" opacity="0.35"/>
  <circle cx="375" cy="90" r="0.8" fill="#50A891" opacity="0.25"/>
  <circle cx="360" cy="185" r="1.1" fill="#50A891" opacity="0.2"/>
</svg>
