<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="#F0F4FA" opacity="0.05"/>
    </pattern>
    <radialGradient id="orbCyan" cx="25%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#50A891" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#50A891" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbPurple" cx="75%" cy="60%" r="30%">
      <stop offset="0%" stop-color="#8B62CC" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8B62CC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0F4FA" stop-opacity="0"/>
      <stop offset="20%" stop-color="#F0F4FA" stop-opacity="0.15"/>
      <stop offset="80%" stop-color="#F0F4FA" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F0F4FA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#50A891" stop-opacity="0"/>
      <stop offset="50%" stop-color="#50A891" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B62CC" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="280" fill="#0F1419"/>
  <rect width="400" height="280" fill="url(#dotGrid)"/>
  <rect width="400" height="280" fill="url(#orbCyan)"/>
  <rect width="400" height="280" fill="url(#orbPurple)"/>

  <!-- Border frame -->
  <rect x="1" y="1" width="398" height="278" fill="none" stroke="#F0F4FA" stroke-opacity="0.1" stroke-width="1.5"/>

  <!-- Corner brackets: cyan top-left/bottom-right, purple top-right/bottom-left -->
  <path d="M 0,20 L 0,0 L 20,0" fill="none" stroke="#50A891" stroke-opacity="0.4" stroke-width="2"/>
  <path d="M 380,0 L 400,0 L 400,20" fill="none" stroke="#8B62CC" stroke-opacity="0.4" stroke-width="2"/>
  <path d="M 0,260 L 0,280 L 20,280" fill="none" stroke="#8B62CC" stroke-opacity="0.4" stroke-width="2"/>
  <path d="M 380,280 L 400,280 L 400,260" fill="none" stroke="#50A891" stroke-opacity="0.4" stroke-width="2"/>

  <!-- Top system text -->
  <text x="200" y="45" text-anchor="middle" fill="#F0F4FA" opacity="0.3" font-family="monospace" font-size="8" letter-spacing="3">// SECURE CONNECTION ESTABLISHED</text>

  <!-- Name -->
  <text x="200" y="110" text-anchor="middle" fill="#F0F4FA" font-family="monospace" font-size="32" font-weight="bold" letter-spacing="4">AHMAD HASAN</text>

  <!-- Role -->
  <text x="200" y="145" text-anchor="middle" fill="#F0F4FA" opacity="0.6" font-family="monospace" font-size="12" letter-spacing="1">Co-founder &amp; CTO @ Constant Labs</text>

  <!-- Accent line centered, width 200 -->
  <rect x="100" y="170" width="200" height="1" fill="url(#accentLine)"/>

  <!-- Tags -->
  <text x="200" y="200" text-anchor="middle" fill="#50A891" opacity="0.7" font-family="monospace" font-size="10" letter-spacing="3">FULL-STACK · AI · IoT · MOBILE · ROBOTICS</text>

  <!-- Location -->
  <text x="200" y="230" text-anchor="middle" fill="#F0F4FA" opacity="0.35" font-family="monospace" font-size="9" letter-spacing="2">physicist turned builder // Dubai, UAE</text>

  <!-- Bottom accent line -->
  <rect x="50" y="260" width="300" height="1" fill="url(#lineGrad)"/>

  <!-- Particles -->
  <circle cx="40" cy="60" r="1" fill="#50A891" opacity="0.4"/>
  <circle cx="360" cy="75" r="1.2" fill="#8B62CC" opacity="0.35"/>
  <circle cx="80" cy="250" r="0.8" fill="#D4A13D" opacity="0.3"/>
  <circle cx="330" cy="40" r="1" fill="#4BA370" opacity="0.35"/>
  <circle cx="150" cy="265" r="0.9" fill="#A03A80" opacity="0.3"/>
  <circle cx="280" cy="35" r="1.1" fill="#50A891" opacity="0.25"/>
  <circle cx="375" cy="220" r="0.7" fill="#D4A13D" opacity="0.4"/>
  <circle cx="20" cy="180" r="1" fill="#8B62CC" opacity="0.3"/>
</svg>
